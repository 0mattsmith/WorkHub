name: Build & Release

# Push a version tag (e.g. v1.1) to build installers and attach them to a
# GitHub Release. You can also run it manually (Actions tab -> Run workflow)
# to produce downloadable build artifacts without publishing a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write        # needed to create/update the GitHub Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest    # Windows .exe (NSIS)
          - macos-13          # macOS Intel (Big Sur+) .dmg
          - macos-14          # macOS Apple Silicon .dmg
          - ubuntu-latest     # Linux .AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (and publish on tags)
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workhub-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
